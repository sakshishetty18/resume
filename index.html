<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume · View & Download</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f4f7fc; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem 1.5rem; }
        .resume-card { max-width: 1000px; width: 100%; background: #ffffff; border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15); overflow: hidden; display: flex; flex-direction: column; height: 85vh; }
        .resume-header { padding: 1.5rem 2rem; background: #ffffff; border-bottom: 1px solid #eef2f6; display: flex; align-items: center; justify-content: space-between; }
        .resume-header h1 { font-size: 1.5rem; font-weight: 600; color: #0b1e33; display: flex; align-items: center; gap: 0.5rem; }
        .resume-header h1 i { color: #2a6df4; }
        .btn { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.5rem; border-radius: 60px; font-weight: 500; font-size: 0.95rem; text-decoration: none; background: #1a3b6b; color: white; transition: 0.2s; box-shadow: 0 4px 12px rgba(26, 59, 107, 0.2); }
        .btn:hover { background: #0f2b4f; transform: translateY(-1px); }
        .resume-body { flex: 1; width: 100%; background: #fafcff; padding: 1rem; }
        iframe { width: 100%; height: 100%; border: none; border-radius: 12px; }
        @media (max-width: 600px) { body { padding: 1rem 0.5rem; } .resume-card { height: 90vh; border-radius: 16px; } .resume-header { padding: 1rem; } }
    </style>
</head>
<body>

<div class="resume-card">
    <div class="resume-header">
        <h1><i class="fas fa-file-pdf"></i> My Resume</h1>
        <a class="btn" href="resume.pdf" download="Resume.pdf" title="Download PDF">
            <i class="fas fa-download"></i> Download PDF
        </a>
    </div>

    <div class="resume-body">
        <iframe src="resume.pdf"></iframe>
    </div>
</div>

</body>
</html>
